function buildFilterPanel() {
  const panel = document.getElementById('filterPanel');
  
  // Base set: all errors matching diff filter and vine debug filter (if active)
  let baseFiltered = state.diffFilter === 'all' ? state.errors :
    state.errors.filter(e => (e._diff || 'unchanged') === state.diffFilter);
  if (state.vineDebugXrefs) {
    baseFiltered = baseFiltered.filter(e => {
      const refs = e.individuals || [];
      return refs.length > 0 && refs.some(r => state.vineDebugXrefs.has(r));
    });
  }
  const diffFiltered = baseFiltered;
  
  // Severity counts: only non-dup errors (severity's domain)
  const sevCounts = { error: 0, warning: 0, info: 0 };
  // Confidence counts: only dup errors (confidence's domain)
  const confCounts = { near_certain: 0, probable: 0, possible: 0 };
  
  for (const err of diffFiltered) {
    if (err.category === 'duplicate') {
      if (err.confidence && confCounts.hasOwnProperty(err.confidence)) {
        confCounts[err.confidence]++;
      }
    } else {
      sevCounts[err.severity] = (sevCounts[err.severity] || 0) + 1;
    }
  }
  
  // Category/subcategory counts come from the filtered set
  const filtered = filterErrors();
  const tree = {};  // category -> { subcategory -> count }
  for (const err of filtered) {
    const cat = err.category;
    const sub = err.subcategory || '_none';
    if (!tree[cat]) tree[cat] = {};
    tree[cat][sub] = (tree[cat][sub] || 0) + 1;
  }
  
  // fullTree: all categories/subs that exist in the data — never filtered,
  // so checkboxes don't disappear when other filters reduce the set to 0
  const fullTree = {};
  for (const err of state.errors) {
    const cat = err.category;
    const sub = err.subcategory || '_none';
    if (!fullTree[cat]) fullTree[cat] = {};
    fullTree[cat][sub] = (fullTree[cat][sub] || 0) + 1;
  }
  
  // Select / deselect all
  const totalFiltered = filtered.length;
  const totalAll = diffFiltered.length;
  const allOn = totalFiltered === totalAll;
  const noneOn = totalFiltered === 0;
  let html = `<label class="filter-all" style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:8px;font-size:11px;color:var(--text-dim);">
    <input type="checkbox" class="filter-cb" ${allOn ? 'checked' : ''}
      ${!allOn && !noneOn ? 'data-indeterminate="true"' : ''}
      onclick="toggleAll(this.checked)">
    <span>Select all</span>
    <span class="fg-count" style="margin-left:auto">${totalFiltered}</span>
  </label>`;
  
  // Helper: render a category group (checkbox + expandable subcategories)
  function renderCatGroup(cat) {
    if (!fullTree[cat]) return '';
    const fullSubs = fullTree[cat];
    const filteredSubs = tree[cat] || {};
    const catTotal = Object.values(filteredSubs).reduce((a, b) => a + b, 0);
    const catLabel = CATEGORY_LABELS[cat] || cat.replace(/_/g, ' ');
    const subKeys = Object.keys(fullSubs).filter(s => s !== '_none');
    const hasSubs = subKeys.length > 0;
    
    const allEnabled = !subKeys.some(s => state.disabledSubs.has(`${cat}/${s}`))
      && !state.disabledSubs.has(`${cat}/_none`);
    const noneEnabled = subKeys.every(s => state.disabledSubs.has(`${cat}/${s}`))
      && (fullSubs['_none'] ? state.disabledSubs.has(`${cat}/_none`) : true);
    
    const isExpanded = state.expandedCats.has(cat);
    
    let h = `<div class="filter-group">`;
    h += `<div class="filter-group-header" data-cat="${cat}">`;
    if (hasSubs) {
      h += `<span class="fg-arrow${isExpanded ? ' open' : ''}" onclick="toggleCatExpand(this.parentElement)">▶</span>`;
    } else {
      h += `<span style="width:12px"></span>`;
    }
    h += `<input type="checkbox" class="filter-cb fg-cb" 
      ${allEnabled ? 'checked' : ''} 
      ${!allEnabled && !noneEnabled ? 'data-indeterminate="true"' : ''}
      onclick="event.stopPropagation(); toggleCategory('${cat}', this.checked)">`;
    h += `<span class="fg-name" onclick="event.preventDefault(); event.stopPropagation(); soloCategory('${cat}')" 
        title="Show only this category">${esc(catLabel)}</span>`;
    h += `<span class="fg-count">${catTotal}</span>`;
    h += `</div>`;
    
    if (hasSubs) {
      h += `<div class="filter-sub-list${isExpanded ? ' open' : ''}">`;
      if (fullSubs['_none']) {
        const subKey = `${cat}/_none`;
        const checked = !state.disabledSubs.has(subKey);
        const subCount = filteredSubs['_none'] || 0;
        h += `<div class="filter-sub-item">
          <input type="checkbox" class="filter-cb" ${checked ? 'checked' : ''} 
            onclick="toggleSub('${subKey}', this.checked)">
          <span class="fg-name" onclick="event.preventDefault(); event.stopPropagation(); soloSub('${subKey}')" 
            title="Show only this">Other</span>
          <span class="fs-count">${subCount}</span>
        </div>`;
      }
      for (const sub of subKeys.sort()) {
        const subKey = `${cat}/${sub}`;
        const checked = !state.disabledSubs.has(subKey);
        const subLabel = SUBCATEGORY_LABELS[sub] || sub.replace(/_/g, ' ');
        const subCount = filteredSubs[sub] || 0;
        h += `<div class="filter-sub-item">
          <input type="checkbox" class="filter-cb" ${checked ? 'checked' : ''} 
            onclick="toggleSub('${subKey}', this.checked)">
          <span class="fg-name" onclick="event.preventDefault(); event.stopPropagation(); soloSub('${subKey}')" 
            title="Show only this">${esc(subLabel)}</span>
          <span class="fs-count">${subCount}</span>
        </div>`;
      }
      h += `</div>`;
    }
    h += `</div>`;
    return h;
  }
  
  // ── ANOMALIES section ──
  const sevLabels = { error: 'conflict', warning: 'warning', info: 'for review' };
  html += `<div class="filter-section-label">Anomalies</div>`;
  html += `<div class="filter-severity">`;
  for (const sev of ['error', 'warning', 'info']) {
    if (sevCounts[sev] > 0) {
      const activeClass = state.severities[sev] ? `active-${sev}` : '';
      html += `<div class="filter-sev-btn ${activeClass}" data-sev="${sev}" onclick="toggleSeverity('${sev}')">${sevLabels[sev]} (${sevCounts[sev]})</div>`;
    }
  }
  html += `</div>`;
  
  const nonDupOrder = ['chronology', 'biological', 'family_structure', 'data_integrity', 'structural'];
  const allCats = Object.keys(fullTree);
  for (const c of allCats) {
    if (c !== 'duplicate' && !nonDupOrder.includes(c)) nonDupOrder.push(c);
  }
  for (const cat of nonDupOrder) {
    html += renderCatGroup(cat);
  }
  
  // ── DUPLICATES section ──
  if (fullTree['duplicate']) {
    const hasConfidence = confCounts.near_certain + confCounts.probable + confCounts.possible > 0;
    const dupFullSubs = fullTree['duplicate'];
    const dupFilteredSubs = tree['duplicate'] || {};
    const dupSubKeys = Object.keys(dupFullSubs).filter(s => s !== '_none');
    const dupAllEnabled = !dupSubKeys.some(s => state.disabledSubs.has(`duplicate/${s}`))
      && !state.disabledSubs.has('duplicate/_none');
    const dupNoneEnabled = dupSubKeys.every(s => state.disabledSubs.has(`duplicate/${s}`))
      && (dupFullSubs['_none'] ? state.disabledSubs.has('duplicate/_none') : true);
    const dupTotal = Object.values(dupFilteredSubs).reduce((a, b) => a + b, 0);
    
    html += `<div class="filter-section-label" style="margin-top:10px;display:flex;align-items:center;gap:6px;">
        <input type="checkbox" class="filter-cb" 
          ${dupAllEnabled ? 'checked' : ''} 
          ${!dupAllEnabled && !dupNoneEnabled ? 'data-indeterminate="true"' : ''}
          onclick="toggleCategory('duplicate', this.checked)">
        <span class="fg-name" onclick="event.preventDefault(); event.stopPropagation(); soloCategory('duplicate')" 
          title="Show only duplicates">Duplicates</span>
      <span class="fg-count" style="margin-left:auto">${dupTotal}</span>
    </div>`;
    if (hasConfidence) {
      const confLabels = { near_certain: 'near certain', probable: 'probable', possible: 'possible' };
      const confColors = { near_certain: 'error', probable: 'warning', possible: 'info' };
      html += `<div class="filter-severity">`;
      for (const conf of ['near_certain', 'probable', 'possible']) {
        if (confCounts[conf] > 0) {
          const activeClass = state.confidences[conf] ? `active-${confColors[conf]}` : '';
          html += `<div class="filter-sev-btn ${activeClass}" onclick="toggleConfidence('${conf}')">${confLabels[conf]} (${confCounts[conf]})</div>`;
        }
      }
      html += `</div>`;
    }
    // Subcategories directly (always visible, no expand/collapse needed)
    if (dupSubKeys.length > 0) {
      html += `<div class="filter-sub-list open" style="padding-left:8px;">`;
      if (dupFullSubs['_none']) {
        const subKey = 'duplicate/_none';
        const checked = !state.disabledSubs.has(subKey);
        const subCount = dupFilteredSubs['_none'] || 0;
        html += `<div class="filter-sub-item">
          <input type="checkbox" class="filter-cb" ${checked ? 'checked' : ''} 
            onclick="toggleSub('${subKey}', this.checked)">
          <span class="fg-name" onclick="event.preventDefault(); event.stopPropagation(); soloSub('${subKey}')" 
            title="Show only this">Other</span>
          <span class="fs-count">${subCount}</span>
        </div>`;
      }
      for (const sub of dupSubKeys.sort()) {
        const subKey = `duplicate/${sub}`;
        const checked = !state.disabledSubs.has(subKey);
        const subLabel = SUBCATEGORY_LABELS[sub] || sub.replace(/_/g, ' ');
        const subCount = dupFilteredSubs[sub] || 0;
        html += `<div class="filter-sub-item">
          <input type="checkbox" class="filter-cb" ${checked ? 'checked' : ''} 
            onclick="toggleSub('${subKey}', this.checked)">
          <span class="fg-name" onclick="event.preventDefault(); event.stopPropagation(); soloSub('${subKey}')" 
            title="Show only this">${esc(subLabel)}</span>
          <span class="fs-count">${subCount}</span>
        </div>`;
      }
      html += `</div>`;
    }
  }
  
  panel.innerHTML = html;
  
  // Set indeterminate state on checkboxes
  panel.querySelectorAll('[data-indeterminate="true"]').forEach(cb => {
    cb.indeterminate = true;
  });
}

function toggleSeverity(sev) {
  state.soloTarget = null; state.preSoloState = null;
  state.severities[sev] = !state.severities[sev];
  // When enabling a severity, ensure subs for categories that use it are enabled
  if (state.severities[sev]) {
    for (const err of state.errors) {
      if (err.category !== 'duplicate' && err.severity === sev) {
        const subKey = `${err.category}/${err.subcategory || '_none'}`;
        state.disabledSubs.delete(subKey);
      }
    }
  }
  buildFilterPanel();
  renderErrors();
}

function toggleConfidence(conf) {
  state.soloTarget = null; state.preSoloState = null;
  state.confidences[conf] = !state.confidences[conf];
  // When enabling a confidence tier, ensure duplicate subs are enabled
  if (state.confidences[conf]) {
    for (const err of state.errors) {
      if (err.category === 'duplicate') {
        const subKey = `${err.category}/${err.subcategory || '_none'}`;
        state.disabledSubs.delete(subKey);
      }
    }
  }
  buildFilterPanel();
  renderErrors();
}

function toggleAll(checked) {
  state.soloTarget = null; state.preSoloState = null;
  // Toggle all severities
  for (const sev of ['error', 'warning', 'info']) {
    state.severities[sev] = checked;
  }
  // Toggle all confidences
  for (const conf of ['near_certain', 'probable', 'possible']) {
    state.confidences[conf] = checked;
  }
  // Toggle all subcategories
  if (checked) {
    state.disabledSubs.clear();
  } else {
    for (const err of state.errors) {
      const subKey = `${err.category}/${err.subcategory || '_none'}`;
      state.disabledSubs.add(subKey);
    }
  }
  buildFilterPanel();
  renderErrors();
}

function toggleCategory(cat, checked) {
  state.soloTarget = null; state.preSoloState = null;
  // Find all subcategories for this category
  const tree = {};
  for (const err of state.errors) {
    if (err.category === cat) {
      const sub = err.subcategory || '_none';
      tree[sub] = true;
    }
  }
  for (const sub of Object.keys(tree)) {
    const key = `${cat}/${sub}`;
    if (checked) {
      state.disabledSubs.delete(key);
    } else {
      state.disabledSubs.add(key);
    }
  }
  // When enabling a category, ensure the relevant gate is also open
  if (checked) {
    if (cat === 'duplicate') {
      for (const conf of ['near_certain', 'probable', 'possible']) {
        state.confidences[conf] = true;
      }
    } else {
      // Enable severity buttons for whatever severities this category uses
      for (const err of state.errors) {
        if (err.category === cat) {
          state.severities[err.severity] = true;
        }
      }
    }
  }
  buildFilterPanel();
  renderErrors();
}

function _saveFilterState() {
  return {
    severities: {...state.severities},
    confidences: {...state.confidences},
    disabledSubs: new Set(state.disabledSubs),
  };
}

function _restoreFilterState(saved) {
  state.severities = {...saved.severities};
  state.confidences = {...saved.confidences};
  state.disabledSubs = new Set(saved.disabledSubs);
}

function soloCategory(cat) {
  const key = `cat:${cat}`;
  
  // If already soloed on this target, unsolo
  if (state.soloTarget === key && state.preSoloState) {
    _restoreFilterState(state.preSoloState);
    state.soloTarget = null;
    state.preSoloState = null;
    buildFilterPanel();
    renderErrors();
    return;
  }
  
  // Save state before first solo (not on re-solo to different target)
  if (!state.soloTarget) {
    state.preSoloState = _saveFilterState();
  }
  state.soloTarget = key;
  
  // Disable all subcategories, then enable only this category's
  for (const err of state.errors) {
    const subKey = `${err.category}/${err.subcategory || '_none'}`;
    state.disabledSubs.add(subKey);
  }
  for (const err of state.errors) {
    if (err.category === cat) {
      const subKey = `${err.category}/${err.subcategory || '_none'}`;
      state.disabledSubs.delete(subKey);
    }
  }
  buildFilterPanel();
  renderErrors();
}

function soloSub(subKey) {
  const key = `sub:${subKey}`;
  
  // If already soloed on this target, unsolo
  if (state.soloTarget === key && state.preSoloState) {
    _restoreFilterState(state.preSoloState);
    state.soloTarget = null;
    state.preSoloState = null;
    buildFilterPanel();
    renderErrors();
    return;
  }
  
  // Save state before first solo
  if (!state.soloTarget) {
    state.preSoloState = _saveFilterState();
  }
  state.soloTarget = key;
  
  // Disable all subcategories, then enable only this one
  for (const err of state.errors) {
    const sk = `${err.category}/${err.subcategory || '_none'}`;
    state.disabledSubs.add(sk);
  }
  state.disabledSubs.delete(subKey);
  buildFilterPanel();
  renderErrors();
}

function toggleSub(subKey, checked) {
  state.soloTarget = null; state.preSoloState = null;
  if (checked) {
    state.disabledSubs.delete(subKey);
    // Ensure the relevant gate is open
    const cat = subKey.split('/')[0];
    if (cat === 'duplicate') {
      for (const conf of ['near_certain', 'probable', 'possible']) {
        state.confidences[conf] = true;
      }
    } else {
      for (const err of state.errors) {
        if (err.category === cat) {
          state.severities[err.severity] = true;
        }
      }
    }
  } else {
    state.disabledSubs.add(subKey);
  }
  buildFilterPanel();
  renderErrors();
}

function toggleCatExpand(header) {
  const cat = header.dataset.cat;
  if (!cat) return;
  if (state.expandedCats.has(cat)) {
    state.expandedCats.delete(cat);
  } else {
    state.expandedCats.add(cat);
  }
  const subList = header.nextElementSibling;
  if (subList && subList.classList.contains('filter-sub-list')) {
    subList.classList.toggle('open');
  }
  const arrow = header.querySelector('.fg-arrow');
  if (arrow) arrow.classList.toggle('open');
}

function buildDiffControls() {
  const container = document.getElementById('diffControls');
  if (!container) return;
  if (!state.diffMode) return;
  
  // Count new/gone/unchanged filtered by vine debug (but not by diff itself)
  let base = state.errors;
  if (state.vineDebugXrefs) {
    base = base.filter(e => {
      const refs = e.individuals || [];
      return refs.length > 0 && refs.some(r => state.vineDebugXrefs.has(r));
    });
  }
  const nNew = base.filter(e => e._diff === 'new').length;
  const nGone = base.filter(e => e._diff === 'gone').length;
  const nUnch = base.filter(e => (e._diff || 'unchanged') === 'unchanged').length;
  
  container.innerHTML = `
    <div class="diff-summary">
      <span class="diff-new-count">+${nNew} new</span> · <span class="diff-gone-count">−${nGone} gone</span>
    </div>
    <div class="diff-controls">
      <div class="diff-btn${state.diffFilter === 'all' ? ' active' : ''}" data-diff="all">All</div>
      <div class="diff-btn${state.diffFilter === 'new' ? ' active' : ''}" data-diff="new">+New (${nNew})</div>
      <div class="diff-btn${state.diffFilter === 'gone' ? ' active' : ''}" data-diff="gone">−Gone (${nGone})</div>
      <div class="diff-btn${state.diffFilter === 'unchanged' ? ' active' : ''}" data-diff="unchanged">Unchanged (${nUnch})</div>
    </div>`;
  
  container.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.diffFilter = btn.dataset.diff;
      buildFilterPanel();
      renderErrors();
    });
  });
}

function filterErrors() {
  return state.errors.filter(e => {
    // VINE Debug tag filter
    if (state.vineDebugXrefs) {
      const refs = e.individuals || [];
      if (refs.length === 0 || !refs.some(r => state.vineDebugXrefs.has(r))) return false;
    }
    
    // Diff filter
    if (state.diffFilter !== 'all') {
      const d = e._diff || 'unchanged';
      if (state.diffFilter !== d) return false;
    }
    
    // Category/subcategory filter (applies to everything including gone errors)
    const subKey = `${e.category}/${e.subcategory || '_none'}`;
    if (state.disabledSubs.has(subKey)) return false;
    
    // Gone errors bypass severity/confidence filters (they don't map cleanly)
    if (e._diff === 'gone') return true;
    
    if (e.category === 'duplicate') {
      if (e.confidence && !state.confidences[e.confidence]) return false;
    } else {
      if (!state.severities[e.severity]) return false;
    }
    return true;
  });
}

// ─── Error List ─────────────────────────────────────────────────────
function renderErrors() {
  const list = document.getElementById('errorList');
  const errors = filterErrors();
  
  // Rebuild vine debug tag counts and diff counts (they depend on current filters)
  buildVineDebugControls();
  buildDiffControls();
  
  list.innerHTML = errors.map((err, i) => {
    const diffClass = (err._diff === 'new') ? ' diff-new' : (err._diff === 'gone') ? ' diff-gone' : '';
    const diffBadge = (err._diff === 'new') ? '<span class="diff-badge diff-new">NEW</span>' :
                      (err._diff === 'gone') ? '<span class="diff-badge diff-gone">GONE</span>' : '';
    return `
      <div class="error-item${diffClass}" data-index="${i}" onclick="errorClick(${i})">
        <div class="error-category">
          <span class="error-severity ${err.severity}"></span>
          ${err.category.replace('_', ' ')}${err.confidence ? ` <span class="conf-badge conf-${err.confidence}">${confLabel(err.confidence)}</span>` : ''}${diffBadge}
        </div>
        <div class="error-message">${linkifyPeople(esc(err.message))}</div>
      </div>`;
  }).join('');
  
  // Keep URL hash in sync with current filter state
  syncFilterHash();
  
  // Update all person link hrefs in the main content to include current filter state
  const filterSuffix = serializeFilterState();
  document.getElementById('mainContent').querySelectorAll('a.person-link[href^="#/"]').forEach(a => {
    const base = a.getAttribute('href').split('?')[0];
    a.setAttribute('href', base + filterSuffix);
  });
  // Also update view tab hrefs
  document.querySelectorAll('a.view-tab[href^="#/"]').forEach(a => {
    const base = a.getAttribute('href').split('?')[0];
    a.setAttribute('href', base + filterSuffix);
  });
  // Also update pedigree node hrefs
  document.querySelectorAll('a.ped-node[href^="#/"]').forEach(a => {
    const base = a.getAttribute('href').split('?')[0];
    a.setAttribute('href', base + filterSuffix);
  });
  // Also update explorer card hrefs
  document.querySelectorAll('a.ex-card[href^="#/"]').forEach(a => {
    const base = a.getAttribute('href').split('?')[0];
    a.setAttribute('href', base + filterSuffix);
  });
}

function syncFilterHash() {
  if (state.currentXref) {
    const hash = `#/${state.currentView}/${state.currentXref}${serializeFilterState()}`;
    if (location.hash !== hash) {
      history.replaceState(null, '', hash);
    }
  }
}

function errorClick(index) {
  const errors = filterErrors();
  const err = errors[index];
  
  if (err._diff === 'gone') {
    // Gone error: person's xref doesn't exist in new file.
    // Show search results in main content area, sorted by birth year proximity.
    const name = err._gone_name || '';
    const birth = err._gone_birth || '';
    if (name) {
      // Search using surname for broader matching
      const parts = name.split(/\s+/);
      const surname = parts.length > 1 ? parts[parts.length - 1] : name;
      
      fetch(`/api/search?q=${encodeURIComponent(surname)}`)
        .then(r => r.json())
        .then(data => {
          // Sort by birth year proximity
          const targetYear = parseInt((birth.match(/\d{4}/) || [])[0]) || 0;
          if (targetYear > 0) {
            data.sort((a, b) => {
              const ya = a.birth ? parseInt((a.birth.match(/\d{4}/) || [])[0]) || 9999 : 9999;
              const yb = b.birth ? parseInt((b.birth.match(/\d{4}/) || [])[0]) || 9999 : 9999;
              return Math.abs(ya - targetYear) - Math.abs(yb - targetYear);
            });
          }
          // Render in main content
          const main = document.getElementById('mainContent');
          main.className = 'main';
          let html = `<div class="profile">
            <div class="profile-header">
              <div class="profile-name" style="color:var(--error)">Gone: ${esc(name)}</div>
              <div class="profile-dates">${birth ? 'b. ' + esc(birth) : 'no birth date'}</div>
              <div class="profile-error gone" style="margin-top:8px;background:var(--error-bg);color:var(--error);padding:6px 10px;border-radius:4px;border-left:3px solid var(--error);font-size:12px;">
                ${esc(err.message)}
              </div>
            </div>
            <div class="section"><h3>Possible matches in new file (${data.length} results for "${esc(surname)}")</h3>`;
          if (data.length === 0) {
            html += `<p style="color:var(--text-dim);font-size:12px;">No matches found — person may have been removed or renamed.</p>`;
          } else {
            for (const r of data.slice(0, 30)) {
              const dates = [r.birth ? `b. ${r.birth}` : '', r.death ? `d. ${r.death}` : ''].filter(Boolean).join(' — ');
              const clean = r.xref.replace(/@/g, '');
              const yearDiff = targetYear > 0 && r.birth ? Math.abs(parseInt((r.birth.match(/\d{4}/) || [])[0]) - targetYear) : null;
              const proximity = yearDiff !== null ? (yearDiff === 0 ? ' ★ exact year' : yearDiff <= 2 ? ' ★ close' : '') : '';
              html += `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
                <a class="person-link" onclick="state.currentView='profile'; navigateTo('${clean}')" style="cursor:pointer;">${esc(r.name)}</a>
                <span style="color:var(--text-dim);margin-left:8px;">${esc(dates)}</span>
                <span style="color:var(--accent);font-size:10px;">${proximity}</span>
              </div>`;
            }
            if (data.length > 30) {
              html += `<p style="color:var(--text-dim);font-size:11px;margin-top:8px;">…and ${data.length - 30} more</p>`;
            }
          }
          html += `</div></div>`;
          main.innerHTML = html;
        });
    }
  } else if (err.individuals && err.individuals.length > 0) {
    navigateTo(err.individuals[0]);
  } else {
    // No individuals list — try to extract first person from message markers [[xref|Name]]
    const markerMatch = err.message.match(/\[\[([^\]|]+)\|/);
    if (markerMatch) {
      navigateTo(markerMatch[1]);
    }
  }
  
  // Highlight active
  document.querySelectorAll('.error-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.error-item[data-index="${index}"]`)?.classList.add('active');
}

// ─── Navigation ─────────────────────────────────────────────────────
function personHash(xref, view) {
  const clean = xref.replace(/@/g, '');
  return `#/${view || state.currentView || 'profile'}/${clean}${serializeFilterState()}`;
}

function serializeFilterState() {
  const parts = [];
  if (state.diffFilter !== 'all') parts.push(`d=${state.diffFilter}`);
  if (state.vineDebugFilter) parts.push(`v=${encodeURIComponent(state.vineDebugFilter)}`);
  if (state.disabledSubs.size > 0) parts.push(`x=${[...state.disabledSubs].map(encodeURIComponent).join(',')}`);
  // Severities: only encode if not all on
  const sevOn = Object.entries(state.severities).filter(([_,v]) => v).map(([k]) => k[0]).join('');
  if (sevOn !== 'ewi') parts.push(`s=${sevOn}`);
  // Confidences: only encode if not all on  
  const confMap = {near_certain:'n', probable:'p', possible:'o'};
  const confOn = Object.entries(state.confidences).filter(([_,v]) => v).map(([k]) => confMap[k]).join('');
  if (confOn !== 'npo') parts.push(`c=${confOn}`);
  return parts.length > 0 ? '?' + parts.join('&') : '';
}

function deserializeFilterState(paramStr) {
  if (!paramStr) return;
  const params = new URLSearchParams(paramStr);
  
  if (params.has('d')) state.diffFilter = params.get('d');
  if (params.has('v')) {
    const tag = decodeURIComponent(params.get('v'));
    state.vineDebugFilter = tag;
    if (state.vineDebugIndex && state.vineDebugIndex[tag]) {
      state.vineDebugXrefs = state.vineDebugIndex[tag];
    }
  }
  if (params.has('x')) {
    state.disabledSubs = new Set(params.get('x').split(',').map(decodeURIComponent));
  }
  if (params.has('s')) {
    const s = params.get('s');
    state.severities = { error: s.includes('e'), warning: s.includes('w'), info: s.includes('i') };
  }
  if (params.has('c')) {
    const c = params.get('c');
    state.confidences = { near_certain: c.includes('n'), probable: c.includes('p'), possible: c.includes('o') };
  }
}

function navigateTo(xref, pushHistory = true) {
  xref = xref.replace(/@/g, '');
  state.currentXref = xref;
  
  // Update URL hash with filter state
  const hash = `#/${state.currentView}/${xref}${serializeFilterState()}`;
  if (pushHistory && !state.navigating) {
    history.pushState(null, '', hash);
  } else {
    history.replaceState(null, '', hash);
  }
  
  if (state.currentView === 'tree') {
    loadTree(xref);
  } else if (state.currentView === 'explorer') {
    loadExplorer(xref);
  } else {
    loadProfile(xref);
  }
}

function navBack() { history.back(); }
function navForward() { history.forward(); }

// Handle browser back/forward and new-tab hash navigation
window.addEventListener('popstate', handleRouteChange);
window.addEventListener('hashchange', handleRouteChange);

function handleRouteChange() {
  const parsed = parseHash();
  if (!parsed) return;
  
  // Update state BEFORE any rendering (syncFilterHash needs current xref)
  state.currentView = parsed.view;
  state.currentXref = parsed.xref;
  state.navigating = true;
  
  // Apply filter state from URL
  if (parsed.filterParams) {
    deserializeFilterState(parsed.filterParams);
    buildVineDebugControls();
    buildFilterPanel();
    renderErrors();
  }
  
  if (parsed.view === 'tree') loadTree(parsed.xref);
  else if (parsed.view === 'explorer') loadExplorer(parsed.xref);
  else loadProfile(parsed.xref);
  
  state.navigating = false;
}

function parseHash() {
  const hash = location.hash;
  // Split hash path from query params: #/profile/I001?d=new&v=TAG
  const qIdx = hash.indexOf('?');
  const path = qIdx >= 0 ? hash.slice(0, qIdx) : hash;
  const params = qIdx >= 0 ? hash.slice(qIdx + 1) : '';
  
  const m = path.match(/^#\/(profile|tree|explorer)\/(.+)$/);
  if (m) return { view: m[1], xref: m[2], filterParams: params };
  const m2 = path.match(/^#\/(.+)$/);
  if (m2) return { view: state.currentView || 'profile', xref: m2[1], filterParams: params };
  return null;
}

function updateNavButtons() {
  // With browser history, these are always available
  document.getElementById('navBack').disabled = false;
  document.getElementById('navFwd').disabled = false;
}

// ─── Profile View ───────────────────────────────────────────────────
async function loadProfile(xref) {
  const main = document.getElementById('mainContent');
  main.className = 'main';
  
  const resp = await fetch(`/api/individual/${xref}`);
  if (!resp.ok) { main.innerHTML = '<p>Individual not found.</p>'; return; }
  const ind = await resp.json();
  
  const sexClass = ind.sex === 'M' ? 'male' : ind.sex === 'F' ? 'female' : '';
  
  let html = `
    <div class="view-tabs">
      ${viewTabsHtml('profile')}
    </div>
    <div class="profile">
      <div class="profile-header">
        <div class="profile-name ${sexClass}">${esc(ind.name)}</div>
        <div class="profile-xref">${esc(ind.xref)}</div>
        <div class="profile-dates">`;
  
  if (ind.birth_date_display) {
    html += `b. ${esc(ind.birth_date_display)}`;
    if (ind.birth_place) html += `, ${esc(ind.birth_place)}`;
  }
  if (ind.death_date_display) {
    html += ` — d. ${esc(ind.death_date_display)}`;
    if (ind.death_place) html += `, ${esc(ind.death_place)}`;
  } else if (ind.death_flagged && !ind.death_date_display) {
    html += ' — deceased';
  }
  
  html += `</div>`;
  
  // Birth sources
  html += renderSources(ind.birth_sources, 'vita-sources');
  // Death sources  
  html += renderSources(ind.death_sources, 'vita-sources');
  
  // Profile errors
  if (ind.errors && ind.errors.length > 0) {
    // Apply active sidebar filters to profile errors
    const filteredErrors = ind.errors.filter(err => {
      const subKey = `${err.category}/${err.subcategory || '_none'}`;
      if (state.disabledSubs.has(subKey)) return false;
      if (err.category === 'duplicate') {
        const conf = err.confidence || '';
        if (conf && !state.confidences[conf]) return false;
      } else {
        if (!state.severities[err.severity]) return false;
      }
      return true;
    });
    
    if (filteredErrors.length > 0) {
    html += `<div class="profile-errors">`;
    
    // Separate into: non-duplicates, individual dups (to group), family_match (structured)
    const nonDups = [];
    const indivDups = {};  // key: subcategory|confidence -> [err, ...]
    const famDups = [];
    
    for (const err of filteredErrors) {
      if (err.category !== 'duplicate') {
        nonDups.push(err);
      } else if (err.subcategory === 'family_match' || err.subcategory === 'fuzzy_spouse') {
        famDups.push(err);
      } else {
        const key = `${err.subcategory}|${err.confidence || ''}`;
        if (!indivDups[key]) indivDups[key] = [];
        indivDups[key].push(err);
      }
    }
    
    // Render non-duplicate errors individually
    for (const err of nonDups) {
      const confBadge = err.confidence ? `<span class="conf-badge conf-${err.confidence}">${confLabel(err.confidence)}</span> ` : '';
      html += `<div class="profile-error ${err.severity}">${confBadge}${linkifyPeople(esc(err.message))}</div>`;
    }
    
    // Render grouped individual-level duplicates
    for (const [key, errs] of Object.entries(indivDups)) {
      const conf = errs[0].confidence;
      const confBadge = conf ? `<span class="conf-badge conf-${conf}">${confLabel(conf)}</span> ` : '';
      
      if (errs.length === 1) {
        // Single error — strip self, show only the other person
        const cleaned = stripSelfFromMessage(errs[0].message, ind.xref);
        html += `<div class="profile-error ${errs[0].severity}">${confBadge}${linkifyPeople(esc(cleaned))}</div>`;
      } else {
        // Multiple errors of same type — group them
        // Extract the match type description from the first error (before the " — " separator)
        const firstMsg = errs[0].message;
        const dashIdx = firstMsg.indexOf(' \u2014 ');
        const typeDesc = dashIdx >= 0 ? firstMsg.substring(0, dashIdx) : firstMsg;
        
        // Extract the "other" person markers from each error
        const peopleLinks = errs.map(err => {
          const markers = [];
          const re = /\[\[([^\]|]+)\|([^\]]+)\]\]/g;
          let m;
          while ((m = re.exec(err.message)) !== null) {
            if (m[1] !== ind.xref) {
              markers.push(m[0]);
            }
          }
          return markers.join(', ');
        }).filter(Boolean);
        
        html += `<div class="profile-error ${errs[0].severity}">`;
        html += `${confBadge}${linkifyPeople(esc(typeDesc))}`;
        if (peopleLinks.length > 0) {
          html += `<div class="grouped-matches">`;
          for (const link of peopleLinks) {
            html += `<div class="grouped-match-item">${linkifyPeople(esc(link))}</div>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
      }
    }
    
    // Render family_match and fuzzy_spouse errors with structured display
    for (const err of famDups) {
      const confBadge = err.confidence ? `<span class="conf-badge conf-${err.confidence}">${confLabel(err.confidence)}</span> ` : '';
      
      if (err.detail && err.detail.families && err.detail.families.length === 2) {
        // Structured family-vs-family display
        const [famA, famB] = err.detail.families;
        const overlaps = err.detail.child_overlaps || 0;
        
        html += `<div class="profile-error ${err.severity} fam-match-error">`;
        html += `${confBadge}<strong>Possible duplicate families</strong>`;
        if (overlaps > 0) html += ` (${overlaps} overlapping child${overlaps > 1 ? 'ren' : ''})`;
        
        html += `<div class="fam-match-families">`;
        for (const fam of [famA, famB]) {
          html += `<div class="fam-match-unit">`;
          const parents = [];
          if (fam.husb_name) parents.push(personLink(fam.husb_ref, fam.husb_name));
          if (fam.wife_name) parents.push(personLink(fam.wife_ref, fam.wife_name));
          html += `<div class="fam-match-parents">${parents.join(' + ')}</div>`;
          if (fam.children.length > 0) {
            html += `<div class="fam-match-children">`;
            for (const ch of fam.children) {
              const yearStr = ch.year ? ` (${ch.year})` : '';
              html += `<span class="fam-match-child">${personLink(ch.ref, ch.name)}${esc(yearStr)}</span>`;
            }
            html += `</div>`;
          }
          html += `</div>`;
        }
        html += `</div></div>`;
      } else {
        // Fallback: render with self stripped
        const cleaned = stripSelfFromMessage(err.message, ind.xref);
        html += `<div class="profile-error ${err.severity}">${confBadge}${linkifyPeople(esc(cleaned))}</div>`;
      }
    }
    
    html += `</div>`;
    } // end if filteredErrors.length > 0
  }
  
  html += `</div>`;
  
  // VINE Debug tags
  if (ind.vine_debug && ind.vine_debug.length > 0) {
    html += `<div class="section"><h3>VINE Debug</h3>`;
    for (const entry of ind.vine_debug) {
      const t = typeof entry === 'string' ? entry : entry.tag;
      const note = typeof entry === 'object' ? entry.note : '';
      const xref = typeof entry === 'object' ? entry.xref : '';
      html += `<div style="margin-bottom:6px;">
        <a class="vine-debug-tag" onclick="setVineDebugFilter('${esc(t)}')">${esc(t)}</a>`;
      if (xref) {
        const linked = (typeof __INDIVIDUALS !== 'undefined' ? __INDIVIDUALS[xref] : null);
        const linkLabel = entry.xref_name || (linked ? linked.name : xref.replace(/@/g, ''));
        const linkSex = linked ? linked.sex : '';
        html += ` <span style="font-size:11px;margin-left:6px;">x-ref: ${personLink(xref, linkLabel, linkSex)}</span>`;
      }
      if (note) {
        html += `<div style="font-size:12px;color:var(--text-dim);margin-top:3px;margin-left:4px;font-family:var(--serif);">${esc(note)}</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  
  // Parents
  if (ind.parents && ind.parents.length > 0) {
    html += `<div class="section"><h3>Parents</h3>`;
    for (const p of ind.parents) {
      html += `<div class="family-block">`;
      if (p.father_name) {
        html += `<div>Father: ${personLink(p.father_xref, p.father_name, 'M')}</div>`;
      }
      if (p.mother_name) {
        html += `<div>Mother: ${personLink(p.mother_xref, p.mother_name, 'F')}</div>`;
      }
      if (p.siblings.length > 0) {
        html += `<div style="margin-top:8px; font-size:11px; color:var(--text-dim)">Siblings:</div>
          <div class="children-list">`;
        for (const sib of p.siblings) {
          html += `<div class="child-item">${personLink(sib.xref, sib.name, sib.sex)}<span class="child-dates">${sib.birth ? ' b. ' + esc(sib.birth) : ''}</span></div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  
  // Families as spouse
  if (ind.families_as_spouse && ind.families_as_spouse.length > 0) {
    html += `<div class="section"><h3>Families</h3>`;
    for (const fam of ind.families_as_spouse) {
      html += `<div class="family-block">`;
      if (fam.spouse_name) {
        html += `<div class="spouse-line">Spouse: ${personLink(fam.spouse_xref, fam.spouse_name, fam.spouse_sex)}</div>`;
      }
      if (fam.marr_date || fam.marr_place) {
        html += `<div class="marr-info">Married${fam.marr_date ? ' ' + esc(fam.marr_date) : ''}${fam.marr_place ? ', ' + esc(fam.marr_place) : ''}</div>`;
      }
      if (fam.children.length > 0) {
        html += `<div class="children-list">`;
        for (const ch of fam.children) {
          html += `<div class="child-item">
            ${personLink(ch.xref, ch.name, ch.sex)}
            <span class="child-dates">${ch.birth ? ' b. ' + esc(ch.birth) : ''}${ch.death ? ' d. ' + esc(ch.death) : ''}</span>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  
  // Events
  if (ind.events && ind.events.length > 0) {
    html += `<div class="section"><h3>Events</h3>`;
    for (const ev of ind.events) {
      html += `<div class="event-block">
        <div class="event-item">
          <span class="event-type">${esc(ev.type)}</span>
          <span class="event-date">${esc(ev.date_str)}</span>
          <span class="event-place">${esc(ev.place)}</span>
        </div>`;
      html += renderSources(ev.sources, 'event-sources');
      html += `</div>`;
    }
    html += `</div>`;
  }
  
  // Notes
  if (ind.notes && ind.notes.trim()) {
    html += `<div class="section"><h3>Notes</h3>
      <div class="notes-block">${linkifyUrls(esc(ind.notes))}</div>
    </div>`;
  }
  
  html += `</div>`;
  main.innerHTML = html;
}

// ─── Tree View ──────────────────────────────────────────────────────
async function loadTree(xref) {
  const main = document.getElementById('mainContent');
  main.className = 'main tree-view';
  
  const resp = await fetch(`/api/pedigree/${xref}`);
  if (!resp.ok) { main.innerHTML = '<p>Could not load pedigree.</p>'; return; }
  const tree = await resp.json();
  
  let html = `
    <div class="view-tabs">
      ${viewTabsHtml('tree')}
    </div>
    <div class="pedigree" id="pedigreeContainer">`;
  
  html += renderPedigreeNode(tree, 0);
  html += `</div>`;
  main.innerHTML = html;
}

function renderPedigreeNode(node, depth) {
  if (!node) return '<div style="min-width:140px;min-height:50px;"></div>';
  
  const sexClass = node.sex === 'M' ? 'male' : node.sex === 'F' ? 'female' : '';
  const rootClass = depth === 0 ? 'root' : '';
  const xref = node.xref.replace(/@/g, '');
  
  const dates = [node.birth ? `b.${node.birth}` : '', node.death ? `d.${node.death}` : ''].filter(Boolean).join(' ');
  
  if (depth >= 4 || (!node.father && !node.mother)) {
    return `<a class="ped-node ${sexClass} ${rootClass}" href="${personHash(xref, 'profile')}" onclick="state.currentView='profile'; navigateTo('${xref}'); return false;">
      <div class="ped-name">${esc(node.name)}</div>
      <div class="ped-dates">${esc(dates)}</div>
    </a>`;
  }
  
  return `
    <div style="display:flex;align-items:center;">
      <a class="ped-node ${sexClass} ${rootClass}" href="${personHash(xref, 'profile')}" onclick="state.currentView='profile'; navigateTo('${xref}'); return false;">
        <div class="ped-name">${esc(node.name)}</div>
        <div class="ped-dates">${esc(dates)}</div>
      </a>
      <svg width="24" height="60" style="flex-shrink:0;">
        <path d="M0,30 L12,30 L12,10 L24,10" fill="none" stroke="#3a3a42" stroke-width="1"/>
        <path d="M12,30 L12,50 L24,50" fill="none" stroke="#3a3a42" stroke-width="1"/>
      </svg>
      <div style="display:flex;flex-direction:column;gap:4px;">
        ${renderPedigreeNode(node.father, depth + 1)}
        ${renderPedigreeNode(node.mother, depth + 1)}
      </div>
    </div>`;
}

function viewTabsHtml(activeView) {
  const views = [
    ['profile', 'Profile'],
    ['tree', 'Pedigree'],
    ['explorer', 'Explorer'],
  ];
  const xref = state.currentXref || '';
  return views.map(([key, label]) => {
    const active = key === activeView ? 'active' : '';
    const href = xref ? `#/${key}/${xref}` : '#';
    return `<a class="view-tab ${active}" href="${href}" onclick="switchView('${key}'); return false;">${label}</a>`;
  }).join('');
}

// ─── VINE Debug Tag Filter ──────────────────────────────────────────
function buildVineDebugControls() {
  const container = document.getElementById('vineDebugControls');
  if (!container || !state.vineDebugIndex) { if (container) container.innerHTML = ''; return; }
  const tags = Object.keys(state.vineDebugIndex).sort();
  if (tags.length === 0) { container.innerHTML = ''; return; }
  
  // Count errors per tag that pass all non-debug filters (diff + category + severity)
  const tagErrorCounts = {};
  for (const t of tags) tagErrorCounts[t] = 0;
  for (const e of state.errors) {
    // Apply diff filter
    if (state.diffFilter !== 'all') {
      const d = e._diff || 'unchanged';
      if (state.diffFilter !== d) continue;
    }
    // Apply category/subcategory/severity/confidence filters
    const subKey = `${e.category}/${e.subcategory || '_none'}`;
    if (state.disabledSubs.has(subKey)) continue;
    if (e._diff !== 'gone') {
      if (e.category === 'duplicate') {
        if (e.confidence && !state.confidences[e.confidence]) continue;
      } else {
        if (!state.severities[e.severity]) continue;
      }
    }
    // Count which tags this error's people match
    const refs = e.individuals || [];
    for (const t of tags) {
      if (refs.some(r => state.vineDebugIndex[t].has(r))) {
        tagErrorCounts[t]++;
      }
    }
  }
  
  let html = `<div style="margin-bottom:8px;">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:4px;">VINE Debug</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      <a class="vine-debug-tag${state.vineDebugFilter ? '' : ' active-vd'}" onclick="setVineDebugFilter(null)" style="font-size:10px;padding:2px 6px;">All</a>`;
  for (const t of tags) {
    const count = tagErrorCounts[t];
    const active = state.vineDebugFilter === t ? ' active-vd' : '';
    html += `<a class="vine-debug-tag${active}" onclick="setVineDebugFilter('${esc(t)}')" style="font-size:10px;padding:2px 6px;">${esc(t)} (${count})</a>`;
  }
  html += `</div></div>`;
  container.innerHTML = html;
}

function setVineDebugFilter(tag) {
  if (state.vineDebugFilter === tag) {
    state.vineDebugFilter = null;
    state.vineDebugXrefs = null;
  } else {
    state.vineDebugFilter = tag;
    state.vineDebugXrefs = tag && state.vineDebugIndex ? (state.vineDebugIndex[tag] || new Set()) : null;
  }
  buildVineDebugControls();
  buildFilterPanel();
  renderErrors();
}

async function showVineDebugIndex() {
  // Header button: show tag index with INDI lists in main content
  const resp = await fetch('/api/vinedebug');
  if (!resp.ok) return;
  const index = await resp.json();
  const allTags = Object.keys(index).sort();
  
  const main = document.getElementById('mainContent');
  main.className = 'main';
  
  if (allTags.length === 0) {
    main.innerHTML = '<div class="welcome"><h2>No VINE Debug tags</h2><p>No _VINEDEBUG tags in this file.</p></div>';
    return;
  }
  
  let html = `<div class="profile">
    <div class="profile-header">
      <div class="profile-name" style="color:#7cc47c;">VINE Debug Tags</div>
      <div class="profile-dates">${allTags.length} tags, ${Object.values(index).reduce((s,a) => s + a.length, 0)} total</div>
    </div>`;
  
  for (const tag of allTags) {
    const people = index[tag];
    html += `<div class="section">
      <h3><a class="vine-debug-tag" onclick="setVineDebugFilter('${esc(tag)}')" style="font-size:12px;padding:3px 10px;">${esc(tag)}</a> <span style="color:var(--text-dim);font-size:11px;">${people.length} individuals</span></h3>`;
    for (const p of people) {
      const clean = p.xref.replace(/@/g, '');
      const dates = [p.birth ? `b. ${p.birth}` : '', p.death ? `d. ${p.death}` : ''].filter(Boolean).join(' — ');
      html += `<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;">
        ${personLink(p.xref, p.name)}
        <span style="color:var(--text-dim);margin-left:8px;">${esc(dates)}</span>
      </div>`;
    }
    html += `</div>`;
  }
  
  html += `</div>`;
  main.innerHTML = html;
}

function switchView(view) {
  state.currentView = view;
  if (state.currentXref) {
    history.pushState(null, '', `#/${view}/${state.currentXref}${serializeFilterState()}`);
    if (view === 'tree') loadTree(state.currentXref);
    else if (view === 'explorer') loadExplorer(state.currentXref);
    else loadProfile(state.currentXref);
  }
}

// ─── Explorer View ──────────────────────────────────────────────────
async function loadExplorer(xref) {
  const main = document.getElementById('mainContent');
  main.className = 'main';
  
  const resp = await fetch(`/api/explorer/${xref}`);
  if (!resp.ok) { main.innerHTML = '<p>Could not load explorer data.</p>'; return; }
  const data = await resp.json();
  const self = data.self;
  
  let html = `
    <div class="view-tabs">
      ${viewTabsHtml('explorer')}
    </div>
    <div class="explorer">`;
  
  // ── Parents section ──
  if (data.parents.length > 0) {
    for (const p of data.parents) {
      html += `<div class="ex-section">
        <div class="ex-label">Parents</div>
        <div class="ex-couple">`;
      if (p.father) html += exCard(p.father, false);
      if (p.father && p.mother) html += `<div class="ex-bond">—</div>`;
      if (p.mother) html += exCard(p.mother, false);
      html += `</div>`;
      
      // Siblings + self in birth order
      const allChildren = [...p.siblings];
      // Insert self into the sibling list in birth-order position
      const selfWithSort = Object.assign({}, self, { birth_sortable: self.birth_sortable || 9999 });
      allChildren.push(selfWithSort);
      allChildren.sort((a, b) => (a.birth_sortable || 9999) - (b.birth_sortable || 9999));
      
      if (allChildren.length > 0) {
        html += `<div class="ex-children-block">
          <div class="ex-children-label">Children</div>
          <div class="ex-row">`;
        for (const sib of allChildren) {
          const isSelf = sib.xref === self.xref;
          html += exCard(sib, isSelf);
        }
        html += `</div></div>`;
      }
      html += `</div>`;
    }
  } else {
    html += `<div class="ex-section">
      <div class="ex-label">Parents</div>
      <div class="ex-empty">No parents recorded</div>
    </div>`;
  }
  
  // ── Families (spouse + children) ──
  if (data.families.length > 0) {
    for (const fam of data.families) {
      html += `<div class="ex-section">
        <div class="ex-label">Family</div>
        <div class="ex-couple">`;
      html += exCard(self, true);
      html += `<div class="ex-bond">—</div>`;
      if (fam.spouse) {
        html += exCard(fam.spouse, false);
      } else {
        html += `<div class="ex-card"><div class="ex-card-name" style="color:var(--text-dim)">Unknown spouse</div></div>`;
      }
      if (fam.marr_date || fam.marr_place) {
        html += `<div class="ex-bond-info">`;
        if (fam.marr_date) html += `m. ${esc(fam.marr_date)}`;
        if (fam.marr_place) html += ` ${esc(fam.marr_place)}`;
        html += `</div>`;
      }
      html += `</div>`;
      
      if (fam.children.length > 0) {
        html += `<div class="ex-children-block">
          <div class="ex-children-label">Children</div>
          <div class="ex-row">`;
        for (const ch of fam.children) {
          html += exCard(ch, false);
        }
        html += `</div></div>`;
      } else {
        html += `<div class="ex-children-block"><div class="ex-empty">No children recorded</div></div>`;
      }
      html += `</div>`;
    }
  } else {
    html += `<div class="ex-section">
      <div class="ex-label">Families</div>
      <div class="ex-empty">No families as spouse recorded</div>
    </div>`;
  }
  
  html += `</div>`;
  main.innerHTML = html;
}

function exCard(person, isSelf) {
  if (!person) return '';
  const sexClass = person.sex === 'M' ? 'male' : person.sex === 'F' ? 'female' : '';
  const selfClass = isSelf ? 'is-self' : '';
  const xref = person.xref.replace(/@/g, '');
  const dates = [person.birth ? `b.${person.birth}` : '', person.death ? `d.${person.death}` : ''].filter(Boolean).join(' ');
  const upInd = person.has_parents ? 'active' : '';
  const downInd = person.has_children ? 'active' : '';
  
  return `<a class="ex-card ${sexClass} ${selfClass}" href="${personHash(xref, 'explorer')}" onclick="navigateTo('${xref}'); return false;">
    <div class="ex-card-name">${esc(person.name)}</div>
    <div class="ex-card-dates">${esc(dates)}</div>
    <div class="ex-card-indicators">
      <span class="ex-indicator ${upInd}" title="Has parents">↑</span>
      <span class="ex-indicator ${downInd}" title="Has children">↓</span>
    </div>
  </a>`;
}

// ─── Search ─────────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  let debounce = null;
  
  input.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(async () => {
      const q = input.value.trim();
      if (q.length < 2) { results.classList.remove('active'); return; }
      
      const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      let data = await resp.json();
      
      if (data.length === 0) {
        results.innerHTML = '<div class="search-result" style="color:var(--text-dim)">No results</div>';
      } else {
        results.innerHTML = data.map(r => {
          const dates = [r.birth ? `b.${r.birth}` : '', r.death ? `d.${r.death}` : ''].filter(Boolean).join(' ');
          const clean = r.xref.replace(/@/g, '');
          const href = personHash(clean);
          return `<a class="search-result" href="${href}" onclick="navigateTo('${clean}'); document.getElementById('searchResults').classList.remove('active'); document.getElementById('searchInput').value = ''; return false;">
            <span class="sr-name">${esc(r.name)}</span>
            <span class="sr-dates">${esc(dates)}</span>
          </a>`;
        }).join('');
      }
      results.classList.add('active');
    }, 200);
  });
  
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-box')) results.classList.remove('active');
  });
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') results.classList.remove('active');
  });
}

// ─── CSV Download ───────────────────────────────────────────────────
function buildCsvUrl(el) {
  const params = new URLSearchParams();
  
  // Severity filter
  const enabledSevs = Object.entries(state.severities)
    .filter(([_, on]) => on).map(([s]) => s);
  if (enabledSevs.length < 3) {
    params.set('sev', enabledSevs.join(','));
  }
  
  // Subcategory filter
  if (state.disabledSubs.size > 0) {
    params.set('exclude', [...state.disabledSubs].join(','));
  }
  
  // Confidence filter
  const enabledConfs = Object.entries(state.confidences)
    .filter(([_, on]) => on).map(([c]) => c);
  if (enabledConfs.length < 3) {
    params.set('conf', enabledConfs.join(','));
  }
  
  // Count what will be downloaded (same logic as filterErrors)
  const count = state.errors.filter(e => {
    const subKey = `${e.category}/${e.subcategory || '_none'}`;
    if (state.disabledSubs.has(subKey)) return false;
    if (e.category === 'duplicate') {
      if (e.confidence && !state.confidences[e.confidence]) return false;
    } else {
      if (!state.severities[e.severity]) return false;
    }
    return true;
  }).length;
  console.log(`CSV download: ${count} errors, excluded: [${[...state.disabledSubs].join(', ')}]`);
  
  const qs = params.toString();
  el.href = '/api/errors.csv' + (qs ? '?' + qs : '');
  return true;  // allow the navigation
}

// ─── Helpers ────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

const CONF_LABELS = {near_certain: 'near certain', probable: 'probable', possible: 'possible'};
function confLabel(c) { return CONF_LABELS[c] || ''; }

function personLink(xref, name, sex) {
  if (!xref) return esc(name);
  const clean = xref.replace(/@/g, '');
  const sexClass = sex === 'M' ? 'male' : sex === 'F' ? 'female' : '';
  const href = personHash(xref);
  return `<a class="person-link ${sexClass}" href="${href}" onclick="navigateTo('${clean}'); return false;">${esc(name)}</a>`;
}

function decodeURIComponentSafe(str) {
  try { return decodeURIComponent(str); }
  catch { return str; }
}

function renderSources(sources, cssClass) {
  if (!sources || sources.length === 0) return '';
  let html = `<div class="${cssClass}">`;
  for (const src of sources) {
    html += `<div class="source-item">`;
    if (src.page) html += `<div class="source-page">${esc(src.page)}</div>`;
    if (src.text) html += `<div class="source-text">${esc(src.text)}</div>`;
    if (src.note) html += `<div class="source-note">${esc(src.note)}</div>`;
    if (src.url) html += `<span class="source-url"><a href="${esc(src.url)}" target="_blank" rel="noopener">record</a></span>`;
    if (src.scan_url) html += `${src.url ? '<span class="source-sep">/</span>' : ''}<span class="source-url"><a href="${esc(src.scan_url)}" target="_blank" rel="noopener">scan</a></span>`;
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function linkifyUrls(text) {
  return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--link)">$1</a>');
}

function linkifyPeople(text) {
  // Convert [[xref|Name]] markers to clickable person links
  // Note: text is already HTML-escaped, so name is safe to insert directly
  return text.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, (_, xref, name) => {
    const clean = xref.replace(/@/g, '');
    const href = personHash(xref);
    return `<a class="person-link" href="${href}" onclick="navigateTo('${clean}'); event.stopPropagation(); return false;" style="color:inherit;text-decoration:underline;">${name}</a>`;
  });
}

function stripPeopleMarkers(text) {
  // Strip [[xref|Name]] markers to plain Name (for CSV etc)
  return text.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '$2');
}

function stripSelfFromMessage(text, selfXref) {
  // Remove the profile person's own [[xref|Name]] marker from a message,
  // then clean up leftover separators (↔, trailing —, leading/trailing commas)
  const escaped = selfXref.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  let result = text.replace(new RegExp('\\[\\[' + escaped + '\\|[^\\]]+\\]\\]'), '');
  // Clean up orphaned ↔ (either side now empty)
  result = result.replace(/\s*↔\s*/g, ' ');
  // Clean up " — " followed by only whitespace or end
  result = result.replace(/\s*—\s*$/, '');
  // Clean up stray commas (leading after —, doubled, trailing)
  result = result.replace(/(—\s*),\s*/g, '$1');
  result = result.replace(/,\s*,/g, ',');
  result = result.replace(/,\s*$/, '');
  result = result.replace(/\s{2,}/g, ' ').trim();
  return result;
}

// Mobile sidebar toggle
function toggleSidebar() {
  const sb = document.querySelector('.sidebar');
  const btn = document.getElementById('sidebarToggle');
  sb.classList.toggle('mobile-open');
  btn.classList.toggle('active');
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.altKey && e.key === 'ArrowLeft') { navBack(); e.preventDefault(); }
  if (e.altKey && e.key === 'ArrowRight') { navForward(); e.preventDefault(); }
  if (e.key === '/' && !e.target.closest('input')) {
    document.getElementById('searchInput').focus();
    e.preventDefault();
  }
});

init();
