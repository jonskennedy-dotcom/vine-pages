<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WineTaster — vine3_component.ged</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400&display=swap');
  
  :root {
    --bg: #1a1a1e;
    --bg-raised: #212125;
    --bg-hover: #292930;
    --bg-active: #31313a;
    --border: #35353d;
    --border-light: #484852;
    --text: #ddd9d3;
    --text-dim: #908980;
    --text-bright: #f5f2ed;
    --accent: #c49a6c;
    --accent-dim: #8a6d4b;
    --error: #d45555;
    --error-bg: #2d1f1f;
    --warning: #d4a855;
    --warning-bg: #2d2a1f;
    --info: #5588bb;
    --info-bg: #1f2530;
    --link: #7baacc;
    --male: #6a9fcc;
    --female: #cc7a8a;
    --ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --serif: 'Source Serif 4', Georgia, serif;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: inherit; }
  
  body {
    font-family: var(--ui);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    height: 100vh;
    overflow: hidden;
  }
  
  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: 52px 1fr;
    height: 100vh;
  }
  
  .header {
    grid-column: 1 / -1;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
  }
  
  .header h1 {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  
  .header .file-name {
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 400;
  }
  
  .header .stats {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
  }
  
  .header .stats span { white-space: nowrap; }
  .header .stats .count { color: var(--text); font-weight: 600; }
  
  .search-box {
    position: relative;
    margin-left: 24px;
  }
  
  .search-box input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px 6px 30px;
    color: var(--text);
    font-family: var(--ui);
    font-size: 12px;
    width: 240px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  
  .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(196,154,108,0.15); }
  
  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }
  
  .search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 0 0 6px 6px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 100;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  
  .search-results.active { display: block; }
  
  .search-result {
    display: block;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    transition: background 0.1s;
  }
  
  .search-result:hover { background: var(--bg-hover); }
  .search-result .sr-name { font-family: var(--serif); color: var(--text-bright); font-size: 13px; }
  .search-result .sr-dates { color: var(--text-dim); margin-left: 8px; font-size: 11px; }
  
  /* Sidebar - Error list */
  .sidebar {
    background: var(--bg-raised);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  
  .sidebar-header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-raised);
    z-index: 10;
    max-height: 60vh;
    overflow-y: auto;
    flex-shrink: 0;
  }
  
  .sidebar-header h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  
  .dup-status {
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 8px;
    margin-bottom: 6px;
    border-radius: 3px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: none;
    align-items: center;
    gap: 6px;
  }
  
  .dup-status.active { display: flex; }
  
  .dup-spinner {
    width: 10px;
    height: 10px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;

  @keyframes spin { to { transform: rotate(360deg); } }
  
  .filter-section {
    margin-bottom: 8px;
  }
  
  .filter-section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 3px;
    padding-left: 1px;
  }
  
  .filter-severity {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  
  .filter-sev-btn {
    font-family: var(--ui);
    font-size: 10px;
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  
  .filter-sev-btn:hover { border-color: var(--border-light); color: var(--text); }
  .filter-sev-btn.active-error { background: var(--error-bg); border-color: var(--error); color: var(--error); }
  .filter-sev-btn.active-warning { background: var(--warning-bg); border-color: var(--warning); color: var(--warning); }
  .filter-sev-btn.active-info { background: var(--info-bg); border-color: var(--info); color: var(--info); }
  
  .filter-group {
    margin-bottom: 2px;
  }
  
  .filter-group-header {
    display: flex;
    align-items: center;
    padding: 3px 0;
    cursor: pointer;
    user-select: none;
    font-size: 11px;
    color: var(--text-dim);
    gap: 4px;
  }
  
  .filter-group-header:hover { color: var(--text); }
  
  .fg-name { cursor: pointer; flex: 1; }
  .fg-name:hover { color: var(--accent); }
  
  .filter-group-header .fg-arrow {
    font-size: 9px;
    width: 12px;
    text-align: center;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  
  .filter-group-header .fg-arrow.open { transform: rotate(90deg); }
  
  .filter-group-header .fg-cb {
    flex-shrink: 0;
  }
  
  .filter-group-header .fg-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
  }
  
  .filter-sub-list {
    padding-left: 20px;
    display: none;
  }
  
  .filter-sub-list.open { display: block; }
  
  .filter-sub-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 1px 0;
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  
  .filter-sub-item:hover { color: var(--text); }
  
  .filter-sub-item .fs-count {
    margin-left: auto;
    font-size: 10px;
  }
  
  .filter-cb {
    width: 12px;
    height: 12px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  
  .error-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  
  .error-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  
  .error-item:hover { background: var(--bg-hover); }
  .error-item.active { background: var(--bg-active); border-left: 3px solid var(--accent); padding-left: 11px; }
  
  .error-severity {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  
  .error-severity.error { background: var(--error); }
  .error-severity.warning { background: var(--warning); }
  .error-severity.info { background: var(--info); }
  
  /* Diff indicators */
  .diff-badge { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .diff-badge.diff-new { background: #1a3a1a; color: #5cb85c; }
  .diff-badge.diff-gone { background: #3a1a1a; color: #d45555; }
  .error-item.diff-new { border-left: 3px solid #5cb85c; padding-left: 11px; }
  .error-item.diff-gone { border-left: 3px solid #d45555; padding-left: 11px; opacity: 0.7; }
  .error-item.diff-gone:hover { opacity: 1; }
  .diff-controls { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
  .diff-btn { font-family: var(--mono); font-size: 11px; padding: 3px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
  .diff-btn:hover { border-color: var(--border-light); color: var(--text); }
  .diff-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text-bright); }
  .diff-summary { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  .diff-summary .diff-new-count { color: #5cb85c; }
  .diff-summary .diff-gone-count { color: #d45555; }
  
  .error-category {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  
  .conf-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.03em;
    text-transform: none;
    margin-left: 4px;
  }
  .conf-near_certain { background: var(--error-bg); color: var(--error); }
  .conf-probable { background: var(--warning-bg); color: var(--warning); }
  .conf-possible { background: var(--info-bg); color: var(--info); }
  
  .error-message {
    font-family: var(--serif);
    font-size: 12.5px;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.45;
  }
  
  .error-people {
    font-size: 11px;
    color: var(--accent);
  }
  
  .error-people a {
    color: var(--accent);
    text-decoration: none;
  }
  
  .error-people a:hover { text-decoration: underline; }
  
  /* Main content */
  .main {
    overflow-y: auto;
    padding: 28px 36px;
  }
  
  .main.tree-view {
    overflow: auto;
    padding: 24px;
  }
  
  /* View tabs */
  .view-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 24px;
  }
  
  .view-tab {
    font-family: var(--ui);
    font-size: 12px;
    padding: 7px 16px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  
  .view-tab:first-child { border-radius: 6px 0 0 6px; }
  .view-tab:last-child { border-radius: 0 6px 6px 0; }
  .view-tab:hover { color: var(--text); }
  .view-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text-bright); }
  
  /* Profile view */
  .profile { max-width: 900px; }
  
  .profile-header {
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .profile-name {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 2px;
    letter-spacing: -0.01em;
  }
  
  .profile-name.male { color: var(--male); }
  .profile-name.female { color: var(--female); }
  
  .profile-xref {
    font-size: 11px;
    color: var(--text-dim);
  }
  
  .profile-dates {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--text);
    margin-top: 8px;
    line-height: 1.6;
  }
  
  .profile-errors {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  
  .profile-error {
    padding: 8px 12px;
    border-radius: 5px;
    font-family: var(--serif);
    font-size: 13px;
    line-height: 1.5;
  }
  
  .profile-error.error { background: var(--error-bg); color: var(--error); border-left: 3px solid var(--error); }
  .profile-error.warning { background: var(--warning-bg); color: var(--warning); border-left: 3px solid var(--warning); }
  .profile-error.info { background: var(--info-bg); color: var(--info); border-left: 3px solid var(--info); }
  
  .grouped-matches {
    margin-top: 6px;
    padding-left: 12px;
    border-left: 1px solid currentColor;
    opacity: 0.85;
  }
  
  .grouped-match-item {
    padding: 2px 0;
    font-size: 12px;
  }
  
  .fam-match-families {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  
  .fam-match-unit {
    flex: 1;
    min-width: 180px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.15);
    border-radius: 4px;
    font-size: 12px;
  }
  
  .fam-match-parents {
    font-weight: 600;
    margin-bottom: 4px;
  }
  
  .fam-match-children {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding-left: 10px;
    border-left: 1px solid currentColor;
    opacity: 0.85;
    margin-top: 4px;
  }
  
  .fam-match-child {
    font-size: 11px;
  }
  
  .section {
    margin-bottom: 28px;
  }
  
  .section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  
  .person-link {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s;
  }
  
  .person-link:hover { text-decoration: underline; }
  .person-link.male { color: var(--male); }
  .person-link.female { color: var(--female); }
  
  .family-block {
    margin-bottom: 16px;
    padding: 14px 18px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  
  .family-block .spouse-line {
    font-family: var(--serif);
    font-size: 14px;
    margin-bottom: 6px;
  }
  
  .family-block .marr-info {
    font-family: var(--serif);
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-style: italic;
  }
  
  .children-list {
    padding-left: 16px;
  }
  
  .child-item {
    font-family: var(--serif);
    font-size: 13px;
    padding: 3px 0;
    line-height: 1.5;
  }
  
  .child-item .child-dates {
    color: var(--text-dim);
    margin-left: 4px;
  }
  
  /* Sources */
  .source-item {
    padding: 10px 14px;
    margin-bottom: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
  }
  
  .source-page { color: var(--text-dim); font-size: 11px; }
  .source-text { color: var(--text); margin-top: 6px; font-family: var(--serif); font-size: 14px; line-height: 1.6; }
  .source-note { color: var(--text-dim); margin-top: 4px; font-family: var(--serif); font-size: 13px; font-style: italic; }
  
  .source-url {
    display: inline-block;
    margin-top: 4px;
  }
  
  .source-url a {
    color: var(--link);
    text-decoration: none;
    font-size: 11px;
    word-break: break-all;
  }
  
  .source-url a:hover { text-decoration: underline; }
  .source-sep { font-size: 11px; color: var(--text-dim); padding: 0 2px; }
  
  /* Inline sources (within events) */
  .event-sources {
    margin-top: 4px;
    margin-left: 16px;
    padding-left: 10px;
    border-left: 2px solid var(--border);
  }
  
  .event-sources .source-item {
    margin-bottom: 4px;
    padding: 4px 8px;
    font-size: 11px;
  }
  
  .event-block {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  
  .event-block:last-child { border-bottom: none; }
  
  .vita-sources {
    margin-top: 6px;
    padding-left: 10px;
    border-left: 2px solid var(--border);
  }
  
  .vita-sources .source-item {
    margin-bottom: 4px;
    padding: 4px 8px;
    font-size: 11px;
  }
  
  /* Links section */
  .links-list { display: flex; flex-direction: column; gap: 4px; }
  
  .link-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
  }
  
  .link-title {
    font-family: var(--serif);
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
  }
  
  .link-url a {
    color: var(--link);
    text-decoration: none;
    font-size: 11px;
    word-break: break-all;
  }
  
  .link-url a:hover { text-decoration: underline; }
  
  /* Events */
  .event-item {
    padding: 5px 0;
    font-size: 13px;
    display: flex;
    gap: 12px;
  }
  
  .event-type { font-family: var(--serif); color: var(--text); min-width: 200px; }
  .event-date { font-family: var(--serif); color: var(--text-dim); min-width: 100px; }
  .event-place { font-family: var(--serif); color: var(--text-dim); font-style: italic; }
  
  /* Pedigree tree */
  .pedigree {
    display: flex;
    align-items: center;
    min-width: max-content;
  }
  
  .ped-node {
    display: block;
    padding: 8px 12px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    min-width: 140px;
    margin: 2px 0;
    text-decoration: none;
    color: inherit;
  }
  
  .ped-node:hover { border-color: var(--accent); background: var(--bg-hover); }
  .ped-node.root { border-color: var(--accent); border-width: 2px; }
  
  .ped-node .ped-name {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
  }
  
  .ped-node.male .ped-name { color: var(--male); }
  .ped-node.female .ped-name { color: var(--female); }
  
  .ped-node .ped-dates {
    font-size: 10px;
    color: var(--text-dim);
  }
  
  .ped-gen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-left: 24px;
    position: relative;
  }
  
  .ped-pair {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    position: relative;
  }
  
  .ped-connector {
    width: 24px;
    position: relative;
  }
  
  /* Explorer view */
  .explorer {
    max-width: 1100px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  
  .ex-section {
    position: relative;
    padding: 16px 0;
  }
  
  .ex-section + .ex-section {
    border-top: 1px solid var(--border);
  }
  
  .ex-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  
  .ex-couple {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
  }
  
  .ex-bond {
    padding: 0 8px;
    color: var(--text-dim);
    font-size: 18px;
    line-height: 1;
    user-select: none;
  }
  
  .ex-bond-info {
    font-size: 10px;
    color: var(--text-dim);

  }

    white-space: nowrap;

    text-decoration: none;
    color: inherit;
  }
  
  .ex-card:hover { border-color: var(--accent); background: var(--bg-hover); }
  
  .ex-card.is-self {

    border-width: 2px;
    background: var(--bg-active);
  }
  
  .ex-card .ex-card-name {

function __dateDisplay(d) {

  const [y,m,day] = d;
  if (day && m) return `${day} ${months[m]} ${y}`;

function __dateSortable(d) {

function __personSummary(ref) {

function __buildIndividual(xref) {
  const xk = xref.startsWith('@') ? xref : `@${xref}@`;
  const ind = __INDIVIDUALS[xk];
  if (!ind) return null;
  const result = Object.assign({}, ind);
  result.birth_date_display = ind.birth_date_display;
  result.death_date_display = ind.death_date_display;
  
  // Families as spouse
  const fas = [];
  for (const fref of (ind.fams || [])) {
    const fam = __FAMILIES[fref];
    if (!fam) continue;
    const spRef = fam.husb === xk ? fam.wife : fam.husb;
    const sp = __INDIVIDUALS[spRef] || {};

function __buildExplorer(xref) {

  if (!ind) return null;

function __search(q) {
  q = q.toLowerCase();
  if (q.length < 2) return [];

  const qNum = q.replace(/^[@]?[i]?0*/i, '').replace(/@$/, '');

  const results = [];
  for (const [xref, ind] of Object.entries(__INDIVIDUALS)) {
    const xrefNum = xref.replace(/@/g, '').replace(/^[A-Z]+0*/, '');
    if (ind.name.toLowerCase().includes(q) || (ind.surn||'').toLowerCase().includes(q) || (ind.givn||'').toLowerCase().includes(q)

      results.push({ xref, name: ind.name, givn: ind.givn||'', surn: ind.surn||'', birth: ind.birth_date_display, death: ind.death_date_display, sex: ind.sex, birth_sort: ind.birth_sortable||9999 });
      if (results.length >= 200) break;
    }
  }
  results.sort((a,b) => a.surn.toLowerCase().localeCompare(b.surn.toLowerCase()) || a.givn.toLowerCase().localeCompare(b.givn.toLowerCase()) || a.birth_sort - b.birth_sort);

}

          const t = typeof entry === 'string' ? entry : entry.tag;

      }
      for (const tag in index) index[tag].sort((a,b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));

      const q = u.searchParams.get('q') || '';
      return Promise.resolve(new Response(JSON.stringify(__search(q)), {status: 200, headers: {'Content-Type': 'application/json'}}));
    }
    
    const indMatch = path.match(/^\/api\/individual\/(.+)$/);
    if (indMatch) {
      const data = __buildIndividual(indMatch[1]);
      if (!data) return Promise.resolve(new Response('{"error":"Not found"}', {status: 404}));

    const pedMatch = path.match(/^\/api\/pedigree\/(.+)$/);

      if (!data) return Promise.resolve(new Response('{"error":"Not found"}', {status: 404}));
      return Promise.resolve(new Response(JSON.stringify(data), {status: 200, headers: {'Content-Type': 'application/json'}}));
    }
    
    const expMatch = path.match(/^\/api\/explorer\/(.+)$/);
    if (expMatch) {
      const data = __buildExplorer(expMatch[1]);
      if (!data) return Promise.resolve(new Response('{"error":"Not found"}', {status: 404}));
      return Promise.resolve(new Response(JSON.stringify(data), {status: 200, headers: {'Content-Type': 'application/json'}}));
    }
    
    if (path === '/api/errors.csv') {
      return Promise.resolve(new Response('CSV export not available in static mode', {status: 200, headers: {'Content-Type': 'text/plain'}}));
    }
    
    // Fallback
    return Promise.resolve(new Response('{}', {status: 200, headers: {'Content-Type': 'application/json'}}));

    }
  } catch(e) {}
  
  // If URL has a hash, apply filter state and navigate
  const parsed = parseHash();
  if (parsed) {
    if (parsed.filterParams) {
      deserializeFilterState(parsed.filterParams);
    }
    buildVineDebugControls();
    buildFilterPanel();
    renderErrors();
    state.currentView = parsed.view;
    navigateTo(parsed.xref, false);
  } else {
    buildVineDebugControls();
  }
  
  // Start polling for duplicate detection status
  pollDupStatus();
}

async function pollDupStatus() {
  const statusEl = document.getElementById('dupStatus');
  const textEl = document.getElementById('dupStatusText');
  
  try {
    const resp = await fetch('/api/dup_status');
    const data = await resp.json();
    
    if (data.status === 'running') {
      statusEl.classList.add('active');
      const phaseLabel = data.phase === 'family' ? 'Comparing families' : 'Scanning individuals';
      let msg = `${phaseLabel}…`;
      if (data.total > 0) {
        const pct = Math.min(99, Math.round(data.progress / data.total * 100));
        msg = `${phaseLabel}… ${pct}%`;
        if (data.dup_count > 0) {
          msg += ` (${data.dup_count} found)`;
        }
      }
      textEl.textContent = msg;
      setTimeout(pollDupStatus, 1000);
    } else if (data.status === 'done') {
      // Refresh the error list
      const errResp = await fetch('/api/errors');
      state.errors = await errResp.json();
      
      // Re-add gone errors if in diff mode (they're not from the API)
      if (state.diffMode && typeof __GONE_ERRORS !== 'undefined') {
        for (const g of __GONE_ERRORS) {
          state.errors.push(g);
        }
      }
      
      // Clear any stale duplicate filter state — these are new results
      // the user hasn't reviewed yet, so they should all be visible.
      for (const key of [...state.disabledSubs]) {
        if (key.startsWith('duplicate/')) {
          state.disabledSubs.delete(key);
        }
      }
      state.confidences = { near_certain: true, probable: true, possible: true };
      
      buildFilterPanel();
      renderErrors();
      
      // Update the stats in the header
      const statsResp = await fetch('/api/stats');
      const stats = await statsResp.json();
      const statsEl2 = document.querySelector('.stats');
      if (statsEl2) {
        statsEl2.innerHTML = `
          <span><span class="count">${stats.individuals}</span> individuals</span>
          <span><span class="count">${stats.families}</span> families</span>
          <span><span class="count">${stats.errors}</span> issues</span>`;
      }
      
      // Also refresh the current profile if viewing one (new dup errors may apply)
      if (state.currentXref && state.currentView === 'profile') {
        loadProfile(state.currentXref);
      }
      
      // Show brief completion message then hide
      textEl.textContent = `${data.dup_count} potential duplicates found`;
      statusEl.querySelector('.dup-spinner').style.display = 'none';
      setTimeout(() => { statusEl.classList.remove('active'); }, 4000);
    } else {
      // idle — no dup scan in progress
      statusEl.classList.remove('active');
    }
  } catch (e) {
    // Silently retry
    setTimeout(pollDupStatus, 3000);
  }
}
